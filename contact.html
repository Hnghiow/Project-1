<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Hello World</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 2rem; color: #fffaf0; font-family: "DM Sans", sans-serif; background: radial-gradient(circle at 50% 0%, #404cc3 0, #24286d 34%, #10122d 75%); }
    main { width: min(100%, 760px); padding: clamp(2rem, 6vw, 4rem); border: 1px solid rgba(255,255,255,.35); border-radius: 28px; background: linear-gradient(135deg, rgba(255,255,255,.17), rgba(255,255,255,.03)); box-shadow: 0 30px 90px rgba(4,5,29,.55); backdrop-filter: blur(12px); }
    nav { display: flex; justify-content: flex-end; gap: 1.1rem; margin-bottom: 3rem; }
    nav a { color: #fffaf0; font-weight: 700; text-decoration: none; } nav a:hover, nav a:focus-visible { color: #ffd88c; text-decoration: underline; }
    .eyebrow { color: #ffe1a8; font-size: .78rem; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; }
    h1 { margin: .5rem 0 1.25rem; font: 700 clamp(3.2rem, 10vw, 6rem)/.9 "Playfair Display", Georgia, serif; letter-spacing: -.06em; }
    p { max-width: 560px; font-size: 1.1rem; line-height: 1.75; color: rgba(255,250,240,.9); }
    .email { display: inline-block; margin-top: 1rem; padding: .8rem 1.15rem; border-radius: 999px; color: #24286d; background: #ffd88c; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Main navigation">
      <a href="greeting.html">Home</a>
      <a href="about.html">About</a>
    </nav>
    <p class="eyebrow">Let’s say hello</p>
    <h1>Contact</h1>
    <p>Have a thought, a question, or simply want to share some good news? I would love to hear from you.</p>
    <a class="email" href="mailto:hello@example.com">hello@example.com</a>
  </main>
</body>
</html>
