<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello New World</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

    * { box-sizing: border-box; }
    body {
      min-height: 100vh; margin: 0; display: grid; place-items: center;
      overflow: hidden; color: #fffaf0; font-family: "DM Sans", sans-serif;
      background: radial-gradient(circle at 50% 0%, #404cc3 0, #24286d 34%, #10122d 75%);
    }
    .stars, .stars::before, .stars::after {
      position: fixed; inset: 0; content: ""; pointer-events: none;
      background-image: radial-gradient(#fff 1px, transparent 1.6px);
      background-size: 47px 47px; opacity: .55;
    }
    .stars::before { background-size: 73px 73px; background-position: 21px 17px; opacity: .35; }
    .stars::after { background-size: 113px 113px; background-position: 62px 35px; opacity: .25; }
    .glow { position: fixed; width: 70vmax; height: 70vmax; border-radius: 50%; background: #fa9e66; filter: blur(75px); opacity: .28; transform: translate(37vmax, 31vmax); }
    .poster {
      position: relative; isolation: isolate; width: min(90vw, 780px); min-height: min(78vh, 580px);
      display: grid; place-items: center; padding: 3rem; text-align: center; overflow: hidden;
      border: 1px solid rgba(255,255,255,.35); border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,.17), rgba(255,255,255,.03));
      box-shadow: 0 30px 90px rgba(4,5,29,.55), inset 0 1px rgba(255,255,255,.2);
      backdrop-filter: blur(12px);
    }
    .orbit { position: absolute; width: 620px; height: 230px; border: 1px solid rgba(255,218,153,.4); border-radius: 50%; transform: rotate(-20deg); z-index: -1; }
    .orbit::after { content: "✦"; position: absolute; top: -12px; left: 66%; color: #ffd88c; font-size: 1.7rem; }
    .content { animation: appear 1s cubic-bezier(.2,.8,.2,1) both; }
    .eyebrow { margin: 0 0 1.25rem; color: #ffe1a8; font-size: .78rem; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; }
    h1 { margin: 0; font: 700 clamp(4rem, 15vw, 9.5rem)/.78 "Playfair Display", Georgia, serif; letter-spacing: -.08em; text-shadow: 0 8px 30px rgba(18,15,63,.3); }
    h1 span { display: block; color: #ffd88c; font-style: italic; }
    .divider { width: 68px; height: 2px; margin: 2.4rem auto 1.45rem; background: #ffd88c; }
    .message { max-width: 390px; margin: 0; font-size: clamp(1rem, 2.5vw, 1.15rem); line-height: 1.7; color: rgba(255,250,240,.88); }
    .sun { position: absolute; right: 9%; bottom: -72px; width: 180px; height: 180px; border-radius: 50%; background: linear-gradient(135deg, #ffe39a, #f39772); box-shadow: 0 0 70px #f6a676; z-index: -1; }
    @keyframes appear { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { .content { animation: none; } }
  </style>
</head>
<body>
  <div class="stars"></div><div class="glow"></div>
  <main class="poster">
    <div class="orbit"></div><div class="sun"></div>
    <section class="content">
      <p class="eyebrow">A little brightness for your day</p>
      <h1>Hello <span>World</span></h1>
      <div class="divider"></div>
      <p class="message">Here’s to new beginnings, warm connections, and beautiful possibilities.</p>
    </section>
  </main>
</body>
</html>
